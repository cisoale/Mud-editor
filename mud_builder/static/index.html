<!DOCTYPE html>

<html lang="it">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Realm Builder
    </title>

    <!-- CSS -->

    <link rel="stylesheet"
          href="/static/style.css">

</head>

<body>

    <!-- ===================================== -->
    <!-- APP -->
    <!-- ===================================== -->

    <div id="app">

        <!-- ================================= -->
        <!-- TOPBAR -->
        <!-- ================================= -->

        <header id="topbar">

            <!-- LOGO -->

            <div id="logo">

                REALM BUILDER

            </div>

            <!-- TOOLBAR -->

            <div id="toolbar">

                <button id="newRoomBtn">

                    + Room

                </button>

                <button id="newMobBtn">

                    + Mob

                </button>

                <button id="newAreaBtn">

                    + Area

                </button>

                <button id="linkModeBtn">

                    Link Mode

                </button>

                <button id="zMinusBtn">

                    Z-

                </button>

                <span id="zLevel">

                    Z: 0

                </span>

                <button id="zPlusBtn">

                    Z+

                </button>

            </div>

        </header>

        <!-- ================================= -->
        <!-- MAIN LAYOUT -->
        <!-- ================================= -->

        <div id="mainLayout">

            <!-- ============================= -->
            <!-- LEFT SIDEBAR -->
            <!-- ============================= -->

            <aside id="leftSidebar">

                <h3>

                    Areas

                </h3>

                <div id="areasSidebar"></div>

                <h3 style="margin-top:20px;">

                    Rooms

                </h3>

                <div id="roomList"></div>

            </aside>

            <!-- ============================= -->
            <!-- MAP -->
            <!-- ============================= -->

            <main id="canvasContainer">

                <canvas id="mapCanvas"></canvas>

            </main>

            <!-- ============================= -->
            <!-- RIGHT SIDEBAR -->
            <!-- ============================= -->

            <aside id="rightSidebar">

                <h3>

                    Mobs

                </h3>

                <div id="mobs"></div>

                <h3 style="margin-top:20px;">

                    Regions

                </h3>

                <div id="regions"></div>

            </aside>

        </div>

    </div>

    <!-- ===================================== -->
    <!-- ROOM MODAL -->
    <!-- ===================================== -->

    <div id="roomModal"
         class="modal">

        <div class="modal-content">

            <h2>

                Room Editor

            </h2>

            <!-- VNUM -->

            <label>

                VNUM

            </label>

            <input id="room_vnum"
                   type="number">

            <!-- NAME -->

            <label>

                Name

            </label>

            <input id="room_name"
                   type="text">

            <!-- AREA -->

            <label>

                Area

            </label>

            <input id="room_area"
                   type="text">

            <!-- REGION -->

            <label>

                Region

            </label>

            <input id="room_region"
                   type="text">

            <!-- DESCRIPTION -->

            <label>

                Description

            </label>

            <textarea id="room_long_desc"></textarea>

            <!-- BUTTONS -->

            <div class="modal-buttons">

                <button id="saveRoomBtn">

                    Save

                </button>

                <button id="deleteRoomBtn">

                    Delete

                </button>

                <button id="closeRoomBtn">

                    Close

                </button>

            </div>

        </div>

    </div>

    <!-- ===================================== -->
    <!-- VALIDATION PANEL -->
    <!-- ===================================== -->

    <div id="validationPanel"></div>

    <!-- ===================================== -->
    <!-- JAVASCRIPT -->
    <!-- ===================================== -->

    <script src="/static/js/state.js"></script>

    <script src="/static/js/renderer.js"></script>

    <script src="/static/js/spatial_grid.js"></script>

    <script src="/static/js/data_manager.js"></script>

    <script src="/static/js/sidebar.js"></script>

    <script src="/static/js/interaction.js"></script>

    <script src="/static/js/modals.js"></script>

    <script src="/static/js/validator.js"></script>

    <script src="/static/js/boot.js"></script>

</body>

</html>
