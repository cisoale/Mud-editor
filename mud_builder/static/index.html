<!DOCTYPE html>

<html lang="it">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>

        Realm Builder

    </title>

    <link rel="stylesheet"
          href="/static/style.css">

</head>

<body>

    <div id="app">

        <!-- ================================= -->
        <!-- TOPBAR -->
        <!-- ================================= -->

        <header id="topbar">

            <div id="logo">

                REALM BUILDER

            </div>

            <div id="toolbar">

                <button id="newRoomBtn">

                    + Room

                </button>

                <button id="newMobBtn">

                    + Mob

                </button>

                <button id="mobBrowserBtn">

                    Mob Browser

                </button>

                <button id="newItemBtn">

                    + Item

                </button>

                <button id="itemBrowserBtn">

                    Item Browser

                </button>

                <button id="newAreaBtn">

                    + Area

                </button>

                <button id="linkModeBtn">

                    Link Mode

                </button>

                <button id="centerMapBtn">

                    Center

                </button>

                <button id="zMinusBtn">

                    Z-

                </button>

                <span id="zLevel">

                    Z: 0

                </span>

                <button id="zPlusBtn">

                    Z+

                </button>

            </div>

        </header>

        <!-- ================================= -->
        <!-- MAIN LAYOUT -->
        <!-- ================================= -->

        <div id="mainLayout">

            <!-- ================================= -->
            <!-- LEFT SIDEBAR -->
            <!-- ================================= -->

            <aside id="leftSidebar">

                <!-- ================================= -->
                <!-- AREAS -->
                <!-- ================================= -->

                <div class="sidebarSection">

                    <div class="sidebarSectionHeader"
                         onclick="this.parentElement.classList.toggle('collapsed')">

                        <span>

                            ▼ Areas

                        </span>

                    </div>

                    <div class="sidebarSectionContent">

                        <div id="areasSidebar"></div>

                    </div>

                </div>

                <!-- ================================= -->
                <!-- ROOMS -->
                <!-- ================================= -->

                <div class="sidebarSection">

                    <div class="sidebarSectionHeader"
                         onclick="this.parentElement.classList.toggle('collapsed')">

                        <span>

                            ▼ Rooms

                        </span>

                    </div>

                    <div class="sidebarSectionContent">

                        <div id="roomList"></div>

                    </div>

                </div>

            </aside>

            <!-- ================================= -->
            <!-- MAP -->
            <!-- ================================= -->

            <main id="canvasContainer">

                <canvas id="mapCanvas"></canvas>

            </main>

            <!-- ================================= -->
            <!-- RIGHT SIDEBAR -->
            <!-- ================================= -->

            <aside id="rightSidebar">

                <!-- ================================= -->
                <!-- INSPECTOR -->
                <!-- ================================= -->

                <div class="sidebarSection">

                    <div class="sidebarSectionHeader">

                        <span>

                            Inspector

                        </span>

                    </div>

                    <div class="sidebarSectionContent">

                        <div id="inspectorPanel">

                            <div class="emptyPanel">

                                No room selected

                            </div>

                        </div>

                    </div>

                </div>

                <!-- ================================= -->
                <!-- WORLD INFO -->
                <!-- ================================= -->

                <div class="sidebarSection">

                    <div class="sidebarSectionHeader"
                         onclick="this.parentElement.classList.toggle('collapsed')">

                        <span>

                            ▼ World

                        </span>

                    </div>

                    <div class="sidebarSectionContent">

                        <div id="worldInfo">

                            <div class="emptyPanel">

                                Multi-area world loaded

                            </div>

                        </div>

                    </div>

                </div>

                <!-- ================================= -->
                <!-- VALIDATOR -->
                <!-- ================================= -->

                <div class="sidebarSection">

                    <div class="sidebarSectionHeader"
                         onclick="this.parentElement.classList.toggle('collapsed')">

                        <span>

                            ▼ Validator

                        </span>

                        <span id="validatorCount">

                            0

                        </span>

                    </div>

                    <div class="sidebarSectionContent">

                        <div id="validationPanel"></div>

                    </div>

                </div>

            </aside>

        </div>

    </div>

    <!-- ================================= -->
    <!-- ROOM MODAL -->
    <!-- ================================= -->

    <div id="roomModal"
         class="modal">

        <div class="modal-content roomEditor">

            <!-- ================================= -->
            <!-- HEADER -->
            <!-- ================================= -->

            <div class="editorHeader">

                <h2>

                    Room Editor

                </h2>

            </div>

            <!-- ================================= -->
            <!-- TABS -->
            <!-- ================================= -->

            <div class="editorTabs">

                <button class="editorTab active"
                        data-tab="generalTab">

                    General

                </button>

                <button class="editorTab"
                        data-tab="exitsTab">

                    Exits

                </button>

                <button class="editorTab"
                        data-tab="mobsTab">

                    Mobs

                </button>

                <button class="editorTab"
                        data-tab="staticNpcTab">

                    Static NPCs

                </button>


                <button class="editorTab"
                        data-tab="itemsTab">

                    Items

                </button>

                <button class="editorTab"
                        data-tab="scriptsTab">

                    Scripts

                </button>

            </div>

            <!-- ================================= -->
            <!-- GENERAL TAB -->
            <!-- ================================= -->

            <div id="generalTab"
                 class="editorPanel active">

                <label>

                    VNUM

                </label>

                <input id="room_vnum"
                       type="number">

                <label>

                    Name

                </label>

                <input id="room_name"
                       type="text">

                <label>

                    Area

                </label>

                <input id="room_area"
                       type="text">

                <label>

                    Region

                </label>

                <input id="room_region"
                       type="text">

                <label>

                    Short Description

                </label>

                <input id="room_short_desc"
                       type="text">

                <label>

                    Long Description

                </label>

                <textarea id="room_long_desc"></textarea>

            </div>

            <!-- ================================= -->
            <!-- EXITS TAB -->
            <!-- ================================= -->

            <div id="exitsTab"
                 class="editorPanel">

                <div class="panelHeader">

                    <h3>

                        Exits

                    </h3>

                    <button id="addExitBtn">

                        + Exit

                    </button>

                </div>

                <div id="exitEditor"></div>

            </div>

            <!-- ================================= -->
            <!-- MOBS TAB -->
            <!-- ================================= -->

            <div id="mobsTab"
                 class="editorPanel">

                <div class="panelHeader">

                    <h3>
                        Mobs
                    </h3>

                    <button id="addMobToRoomBtn">
                        + Mob
                    </button>

                </div>

                <div id="roomMobEditor">

                    <div class="emptyPanel">
                        No mobs in room
                    </div>

                </div>

            </div>
            <!--  STATIC NPC  -->
            <div id="staticNpcTab"
                 class="editorPanel">

                <div class="panelHeader">

                    <h3>
                        Static NPCs
                    </h3>

                    <button id="addStaticNpcBtn">
                        + Static NPC
                    </button>

                </div>

                <div id="staticNpcEditor">

                    <div class="emptyPanel">
                        No static NPCs
                    </div>

                </div>

            </div>

            <!-- ================================= -->
            <!-- ITEMS TAB -->
            <!-- ================================= -->

            <div id="itemsTab"
                 class="editorPanel">

                <div class="panelHeader">

                    <h3>

                        Items

                    </h3>

                    <button id="addItemToRoomBtn">

                        + Item

                    </button>

                </div>

                <div id="roomItemEditor">

                    <div class="emptyPanel">

                        No items in room

                    </div>

                </div>

            </div>

            <!-- ================================= -->
            <!-- SCRIPTS TAB -->
            <!-- ================================= -->

            <div id="scriptsTab"
                 class="editorPanel">

                <div class="panelHeader">

                    <h3>

                        Scripts

                    </h3>

                    <button id="addScriptBtn">

                        + Script

                    </button>

                </div>

                <div id="roomScriptEditor">

                    <div class="emptyPanel">

                        No scripts attached

                    </div>

                </div>

            </div>

            <!-- ================================= -->
            <!-- FOOTER -->
            <!-- ================================= -->

            <div class="modal-buttons">

                <button id="saveRoomBtn">

                    Save

                </button>

                <button id="deleteRoomBtn">

                    Delete

                </button>

                <button id="closeRoomBtn">

                    Close

                </button>

            </div>

        </div>

    </div>

    <!-- ================================= -->
    <!-- JAVASCRIPT -->
    <!-- ================================= -->

    <script src="/static/js/state.js"></script>

    <script src="/static/js/renderer.js"></script>

    <script src="/static/js/spatial_grid.js"></script>

    <script src="/static/js/data_manager.js"></script>

    <script src="/static/js/sidebar.js"></script>

    <script src="/static/js/interaction.js"></script>

    <script src="/static/js/modals.js"></script>

    <script src="/static/js/validator.js"></script>

    <script src="/static/js/boot.js"></script>


    <!-- ================================= -->
    <!-- MOB MODAL -->
    <!-- ================================= -->

    <div id="mobModal"
         class="modalOverlay">

        <div class="modalWindow">

            <div class="modalHeader">

                <h2>Create Mob</h2>

            </div>

            <div class="modalBody">

                <label>Mob ID</label>

                <input id="mob_id"
                       type="text">

                <label>Name</label>

                <input id="mob_name"
                       type="text">
                <input id="mob_short_desc"
                       type="text">

                <label>Long Description</label>

                <textarea id="mob_long_desc"></textarea>

                <label>HP</label>

                <input id="mob_hp"
                       type="number"
                       value="100">

                <label>XP Reward</label>

                <input id="mob_xp_reward"
                       type="number"
                       value="0">

                <label>Gold</label>

                <input id="mob_gold"
                       type="number"
                       value="0">
                <label>Level</label>

                <input id="mob_level"
                       type="number"
                       value="1">

            </div>

            <div class="modalFooter">

                <button id="saveMobBtn">

                    Save

                </button>

                <button id="closeMobBtn">

                    Cancel

                </button>

            </div>

        </div>

    </div>
    <!-- ITEM MODAL -->
    <div id="itemModal"
         class="modalOverlay">

        <div class="modalWindow">

            <div class="modalHeader">

                <h2>Create Item</h2>

            </div>

            <div class="modalBody">

                <label>Item ID</label>

                <input id="item_id"
                       type="text">

                <label>Name</label>

                <input id="item_name"
                       type="text">

                <label>Description</label>

                <textarea id="item_desc"></textarea>

                <label>Type</label>

                <input id="item_type"
                       type="text"
                       value="generic">

            </div>

            <div class="modalFooter">

                <button id="saveItemBtn">

                    Save

                </button>

                <button id="closeItemBtn">

                    Cancel

                </button>

            </div>

        </div>

    </div>

    <!-- ================================= -->
    <!-- MOB BROWSER -->
    <!-- ================================= -->

    <div id="mobBrowserModal"
         class="modalOverlay">

        <div class="modalWindow">

            <div class="modalHeader">

                <h2>

                    Mob Browser

                </h2>

            </div>

            <div id="mobBrowserList"
                 class="modalBody">

            </div>

            <div class="modalFooter">

                <button id="closeMobBrowserBtn">

                    Close

                </button>

            </div>

        </div>

    </div>

    <div id="itemBrowserModal"
         class="modalOverlay">

        <div class="modalWindow">

            <div class="modalHeader">

                <h2>

                    Item Browser

                </h2>

            </div>

            <div id="itemBrowserList"
                 class="modalBody">

            </div>

            <div class="modalFooter">

                <button id="closeItemBrowserBtn">

                    Close

                </button>

            </div>

        </div>

    </div>
</body>

</html>
